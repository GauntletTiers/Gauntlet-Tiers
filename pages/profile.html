<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Gauntlet Tiers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            padding: 100px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-header {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--bg-3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            color: var(--accent);
            border: 3px solid var(--accent);
        }
        
        .profile-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .profile-header p {
            color: var(--text-dim);
        }
        
        .profile-section {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .profile-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .tier-display {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--bg-3);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .tier-display .tier-badge {
            font-size: 1.2rem;
            padding: 8px 20px;
        }
        
        .tier-info {
            flex: 1;
        }
        
        .tier-info h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }
        
        .tier-info p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .no-tier {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        .no-tier i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .modes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .mode-tag {
            padding: 6px 12px;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .region-display {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-3);
            border-radius: 4px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .login-prompt {
            text-align: center;
            padding: 100px 20px;
        }
        
        .login-prompt i {
            font-size: 4rem;
            color: var(--text-dark);
            margin-bottom: 20px;
        }
        
        .login-prompt h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .login-prompt p {
            color: var(--text-dim);
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>GAUNTLET TIERS</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="tierlist.html" class="nav-link">Tier List</a></li>
                <li><a href="community.html" class="nav-link">Community</a></li>
                <li><a href="support.html" class="nav-link">Support</a></li>
            </ul>
            <div class="nav-user" id="navUser">
                <span class="nav-username" id="navUsername"></span>
                <a href="admin.html" class="btn btn-admin hidden" id="navAdmin">Admin</a>
                <a href="profile.html" class="btn btn-secondary btn-nav">Profile</a>
                <button class="btn btn-nav" onclick="logout()" style="background: transparent; border: 1px solid var(--border);">Logout</button>
            </div>
            <div class="nav-user" id="navGuest">
                <a href="login.html" class="btn btn-primary btn-nav">Login</a>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div id="profileContent"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="../index.html" class="footer-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>GAUNTLET TIERS</span>
                </a>
                <div class="footer-links">
                    <a href="../index.html">Home</a>
                    <a href="tierlist.html">Rankings</a>
                    <a href="community.html">Community</a>
                    <a href="support.html">Support</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        const regions = {
            na: { name: 'NA', label: 'North America', class: 'region-na' },
            sa: { name: 'SA', label: 'South America', class: 'region-sa' },
            eu: { name: 'EU', label: 'Europe', class: 'region-eu' },
            as: { name: 'AS', label: 'Asia', class: 'region-as' },
            au: { name: 'AU', label: 'Oceania', class: 'region-au' }
        };
        
        const currentUser = getCurrentUser();
        const container = document.getElementById('profileContent');
        
        if (!currentUser) {
            container.innerHTML = `
                <div class="login-prompt">
                    <i class="fas fa-user-lock"></i>
                    <h2>Login Required</h2>
                    <p>Please login to view your profile and tier information.</p>
                    <a href="login.html" class="btn btn-primary">Login</a>
                </div>
            `;
        } else {
            const player = getPlayerByEmail(currentUser.email);
            const tierData = player ? getTierData(player.tier) : null;
            const regionData = player ? regions[player.region] : null;
            
            container.innerHTML = `
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <h1>${currentUser.username}</h1>
                        <p>${currentUser.email}</p>
                    </div>
                    
                    <div class="profile-section">
                        <h2><i class="fas fa-trophy"></i> Current Tier</h2>
                        ${player && player.tier ? `
                            <div class="tier-display">
                                <span class="tier-badge ${tierData.class}">${tierData.name}</span>
                                <div class="tier-info">
                                    <h3>${tierData.label}</h3>
                                    <p>Your current ranking tier</p>
                                </div>
                            </div>
                            
                            ${regionData ? `
                                <div style="margin-top: 15px;">
                                    <strong style="color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase;">Region:</strong>
                                    <div class="region-display ${regionData.class}" style="margin-top: 5px;">
                                        <i class="fas fa-globe"></i>
                                        ${regionData.name} - ${regionData.label}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${player.modes && player.modes.length > 0 ? `
                                <div style="margin-top: 20px;">
                                    <strong style="color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase;">Game Modes:</strong>
                                    <div class="modes-list">
                                        ${player.modes.map(m => `<span class="mode-tag">${m.charAt(0).toUpperCase() + m.slice(1)}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        ` : `
                            <div class="no-tier">
                                <i class="fas fa-question-circle"></i>
                                <p>You haven't been ranked yet. Join our Discord and participate in tournaments to get placed!</p>
                                <a href="https://discord.gg/GcqFCAnBjm" target="_blank" class="btn btn-primary" style="margin-top: 15px;">
                                    <i class="fab fa-discord"></i> Join Discord
                                </a>
                            </div>
                        `}
                    </div>
                    
                    <div class="profile-section">
                        <h2><i class="fas fa-info-circle"></i> Account Information</h2>
                        <div style="display: grid; gap: 15px;">
                            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-dim);">Username</span>
                                <span style="font-weight: 600;">${currentUser.username}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-dim);">Email</span>
                                <span style="font-weight: 600;">${currentUser.email}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                                <span style="color: var(--text-dim);">Account Type</span>
                                <span style="font-weight: 600; color: ${currentUser.isAdmin ? 'var(--gold)' : 'var(--accent)'};">
                                    ${currentUser.isAdmin ? '<i class="fas fa-crown"></i> Administrator' : 'Standard User'}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
